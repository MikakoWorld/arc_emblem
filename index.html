<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>アイギス・アーク エンブレム</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #18202a;
        --muted: #667085;
        --line: #d8dde5;
        --panel: #ffffff;
        --page: #f4f1ec;
        --accent: #0f766e;
        --accent-ink: #ffffff;
        --focus: #b45309;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background: var(--page);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body.modal-open {
        overflow: hidden;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(320px, 410px) minmax(0, 1fr);
        min-height: 100vh;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 18px;
        padding: 24px;
        background: var(--panel);
        border-right: 1px solid var(--line);
        overflow-y: auto;
      }

      .brand {
        display: grid;
        gap: 6px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.45rem, 1.05rem + 1vw, 2rem);
        line-height: 1.15;
        letter-spacing: 0;
      }

      .meta {
        margin: 0;
        color: var(--muted);
        font-size: 0.93rem;
      }

      fieldset {
        display: grid;
        gap: 12px;
        margin: 0;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfd;
      }

      legend {
        padding: 0 6px;
        color: #344054;
        font-size: 0.9rem;
        font-weight: 700;
      }

      label,
      .label {
        display: grid;
        gap: 7px;
        color: #344054;
        font-size: 0.9rem;
        font-weight: 650;
      }

      input[type="color"] {
        width: 100%;
        height: 44px;
        padding: 4px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      select {
        width: 100%;
        min-height: 42px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        background: #ffffff;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .segmented {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 4px;
        padding: 4px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #eef2f6;
      }

      .segmented input {
        position: absolute;
        inline-size: 1px;
        block-size: 1px;
        opacity: 0;
      }

      .segmented span {
        display: grid;
        min-height: 34px;
        place-items: center;
        border-radius: 6px;
        color: #475467;
        font-size: 0.88rem;
        font-weight: 700;
      }

      .segmented input:checked + span {
        color: #102a27;
        background: #ffffff;
        box-shadow: 0 1px 2px rgb(16 24 40 / 0.12);
      }

      .swatch-line {
        display: grid;
        grid-template-columns: 46px 1fr;
        gap: 10px;
        align-items: end;
      }

      .alpha-readout {
        display: flex;
        justify-content: space-between;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 600;
      }

      .gradient-controls {
        display: grid;
        gap: 12px;
      }

      .gradient-controls[hidden] {
        display: none;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .actions .wide {
        grid-column: 1 / -1;
      }

      .button {
        display: inline-grid;
        min-height: 44px;
        place-items: center;
        border-radius: 8px;
        font-weight: 800;
      }

      .button.primary {
        color: var(--accent-ink);
        background: var(--accent);
      }

      .button.secondary {
        color: #26333f;
        background: #e5e7eb;
      }

      .stage-wrap {
        display: grid;
        grid-template-rows: auto 1fr;
        min-width: 0;
        padding: 24px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        padding-bottom: 18px;
      }

      .status {
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 650;
      }

      .canvas-shell {
        display: grid;
        min-height: 0;
        place-items: center;
        overflow: auto;
        border: 1px solid #c9d0da;
        border-radius: 8px;
        background:
          linear-gradient(45deg, #d8dde5 25%, transparent 25%),
          linear-gradient(-45deg, #d8dde5 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #d8dde5 75%),
          linear-gradient(-45deg, transparent 75%, #d8dde5 75%);
        background-color: #f8fafc;
        background-position:
          0 0,
          0 10px,
          10px -10px,
          -10px 0;
        background-size: 20px 20px;
      }

      .preview-frame {
        display: grid;
        place-items: center;
        width: min(var(--preview-width), 100%);
        aspect-ratio: var(--preview-ratio);
        box-shadow: 0 18px 55px rgb(16 24 40 / 0.22);
      }

      #preview {
        display: block;
        width: 72%;
        max-height: 86%;
        object-fit: contain;
      }

      .error {
        color: #b42318;
      }

      .ios-save-modal {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
        background: rgb(13 18 26 / 0.78);
      }

      .ios-save-modal[hidden] {
        display: none;
      }

      .ios-save-modal-inner {
        display: flex;
        flex-direction: column;
        width: min(100vw, 920px);
        min-height: 100vh;
        padding: 14px;
        color: #ffffff;
        background: #101418;
      }

      .ios-save-head {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
      }

      .ios-save-head h2 {
        margin: 0;
        font-size: 1rem;
        letter-spacing: 0;
      }

      .ios-save-close {
        min-height: 40px;
        padding: 0 14px;
        border-radius: 8px;
        color: #ffffff;
        background: rgb(255 255 255 / 0.16);
        font-weight: 800;
      }

      .ios-save-modal p {
        margin: 10px 0 12px;
        color: #d9dee7;
        font-size: 0.9rem;
      }

      #iosSaveImage {
        display: block;
        width: 100%;
        min-height: 0;
        flex: 1;
        object-fit: contain;
        border: 1px solid rgb(255 255 255 / 0.18);
        border-radius: 8px;
        background:
          linear-gradient(45deg, rgb(255 255 255 / 0.08) 25%, transparent 25%) 0 0 / 18px 18px,
          linear-gradient(-45deg, rgb(255 255 255 / 0.08) 25%, transparent 25%) 0 0 / 18px 18px,
          linear-gradient(45deg, transparent 75%, rgb(255 255 255 / 0.08) 75%) 0 0 / 18px 18px,
          linear-gradient(-45deg, transparent 75%, rgb(255 255 255 / 0.08) 75%) 0 0 / 18px 18px,
          #050608;
      }

      :focus-visible {
        outline: 3px solid var(--focus);
        outline-offset: 2px;
      }

      @media (max-width: 860px) {
        .app {
          grid-template-columns: 1fr;
        }

        .controls {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .stage-wrap {
          min-height: 60vh;
          padding: 18px;
        }
      }

      @media (max-width: 520px) {
        .controls {
          padding: 16px;
        }

        .row,
        .actions {
          grid-template-columns: 1fr;
        }

        .segmented {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="controls" aria-label="カスタマイズ設定">
        <div class="brand">
          <h1>アイギス・アーク エンブレム</h1>
          <p class="meta">SVGカラー、背景、書き出しサイズを調整できます。</p>
        </div>

        <fieldset>
          <legend>エンブレム</legend>
          <div class="label">
            カラー方式
            <div class="segmented" role="radiogroup" aria-label="カラー方式">
              <label>
                <input type="radio" name="colorMode" value="solid" checked />
                <span>単色</span>
              </label>
              <label>
                <input type="radio" name="colorMode" value="linear" />
                <span>線形</span>
              </label>
              <label>
                <input type="radio" name="colorMode" value="radial" />
                <span>円形</span>
              </label>
            </div>
          </div>

          <div class="swatch-line">
            <input id="solidColor" type="color" value="#111827" aria-label="単色カラー" />
            <label>
              単色カラー
              <select id="preset">
                <option value="custom">カスタム</option>
                <option value="#111827">墨黒</option>
                <option value="#0f766e">翡翠</option>
                <option value="#b45309">金銅</option>
                <option value="#be123c">深紅</option>
                <option value="#2563eb">蒼</option>
              </select>
            </label>
          </div>

          <div id="gradientControls" class="gradient-controls" hidden>
            <div class="row">
              <label>
                グラデーション始点
                <input id="gradientStart" type="color" value="#0f766e" />
              </label>
              <label>
                グラデーション終点
                <input id="gradientEnd" type="color" value="#f59e0b" />
              </label>
            </div>
            <label id="angleControl">
              角度
              <input id="gradientAngle" type="range" min="0" max="360" value="35" />
              <span class="alpha-readout"><span>0°</span><span id="angleValue">35°</span><span>360°</span></span>
            </label>
          </div>
        </fieldset>

        <fieldset>
          <legend>土台</legend>
          <div class="row">
            <label>
              比率
              <select id="ratio">
                <option value="3:4">3:4</option>
                <option value="9:16" selected>9:16</option>
              </select>
            </label>
            <label>
              サイズ
              <select id="size">
                <option value="S">S</option>
                <option value="M" selected>M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
              </select>
            </label>
          </div>

          <label>
            背景色
            <input id="backgroundColor" type="color" value="#f8fafc" />
          </label>
          <label>
            背景の透明度
            <input id="backgroundAlpha" type="range" min="0" max="100" value="100" />
            <span class="alpha-readout"><span>透明</span><span id="alphaValue">100%</span><span>不透明</span></span>
          </label>
          <label>
            エンブレム余白
            <input id="padding" type="range" min="8" max="36" value="18" />
            <span class="alpha-readout"><span>小</span><span id="paddingValue">18%</span><span>大</span></span>
          </label>
        </fieldset>

        <div class="actions">
          <button id="download" class="button primary" type="button">PNG保存</button>
          <button id="downloadSvg" class="button secondary" type="button">SVG保存</button>
          <button id="iosSave" class="button secondary" type="button">iPhone保存</button>
          <button id="reset" class="button secondary wide" type="button">リセット</button>
        </div>
      </aside>

      <section class="stage-wrap" aria-label="プレビュー">
        <div class="toolbar">
          <div id="status" class="status">base.svgを読み込み中</div>
          <div id="dimensions" class="status"></div>
        </div>
        <div class="canvas-shell">
          <div id="frame" class="preview-frame">
            <img id="preview" alt="エンブレムプレビュー" />
          </div>
        </div>
      </section>
    </main>

    <div id="iosSaveModal" class="ios-save-modal" role="dialog" aria-modal="true" aria-labelledby="iosSaveTitle" hidden>
      <div class="ios-save-modal-inner">
        <div class="ios-save-head">
          <h2 id="iosSaveTitle">iPhone 保存用画像</h2>
          <button id="iosSaveClose" class="ios-save-close" type="button">閉じる</button>
        </div>
        <p>画像を長押しして写真アプリに保存できます。</p>
        <img id="iosSaveImage" alt="保存用PNG" />
      </div>
    </div>

    <script>
      const sizeMap = {
        S: { "3:4": [768, 1024], "9:16": [720, 1280] },
        M: { "3:4": [1200, 1600], "9:16": [1080, 1920] },
        L: { "3:4": [1800, 2400], "9:16": [1440, 2560] },
        XL: { "3:4": [2400, 3200], "9:16": [2160, 3840] },
      };

      const defaults = {
        mode: "solid",
        solidColor: "#111827",
        gradientStart: "#0f766e",
        gradientEnd: "#f59e0b",
        gradientAngle: 35,
        ratio: "9:16",
        size: "M",
        backgroundColor: "#f8fafc",
        backgroundAlpha: 100,
        padding: 18,
      };

      const controls = {
        preset: document.querySelector("#preset"),
        solidColor: document.querySelector("#solidColor"),
        gradientStart: document.querySelector("#gradientStart"),
        gradientEnd: document.querySelector("#gradientEnd"),
        gradientAngle: document.querySelector("#gradientAngle"),
        gradientControls: document.querySelector("#gradientControls"),
        angleControl: document.querySelector("#angleControl"),
        angleValue: document.querySelector("#angleValue"),
        ratio: document.querySelector("#ratio"),
        size: document.querySelector("#size"),
        backgroundColor: document.querySelector("#backgroundColor"),
        backgroundAlpha: document.querySelector("#backgroundAlpha"),
        alphaValue: document.querySelector("#alphaValue"),
        padding: document.querySelector("#padding"),
        paddingValue: document.querySelector("#paddingValue"),
        reset: document.querySelector("#reset"),
        download: document.querySelector("#download"),
        downloadSvg: document.querySelector("#downloadSvg"),
        iosSave: document.querySelector("#iosSave"),
        iosSaveModal: document.querySelector("#iosSaveModal"),
        iosSaveClose: document.querySelector("#iosSaveClose"),
        iosSaveImage: document.querySelector("#iosSaveImage"),
      };

      const preview = document.querySelector("#preview");
      const frame = document.querySelector("#frame");
      const status = document.querySelector("#status");
      const dimensions = document.querySelector("#dimensions");

      let baseSvg = "";
      let currentObjectUrl = "";

      init();

      async function init() {
        try {
          const response = await fetch("base.svg", { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          baseSvg = await response.text();
          bindEvents();
          render();
        } catch (error) {
          status.textContent = "base.svgを読み込めませんでした。ローカルサーバーから開いてください。";
          status.classList.add("error");
          controls.download.disabled = true;
          controls.downloadSvg.disabled = true;
          controls.iosSave.disabled = true;
          console.error(error);
        }
      }

      function bindEvents() {
        document.querySelectorAll("input, select").forEach((control) => {
          control.addEventListener("input", render);
          control.addEventListener("change", render);
        });

        document.querySelectorAll('input[name="colorMode"]').forEach((radio) => {
          radio.addEventListener("change", render);
        });

        controls.preset.addEventListener("change", () => {
          if (controls.preset.value !== "custom") {
            controls.solidColor.value = controls.preset.value;
            render();
          }
        });

        controls.solidColor.addEventListener("input", () => {
          controls.preset.value = "custom";
        });

        controls.reset.addEventListener("click", () => {
          document.querySelector(`input[name="colorMode"][value="${defaults.mode}"]`).checked = true;
          controls.solidColor.value = defaults.solidColor;
          controls.gradientStart.value = defaults.gradientStart;
          controls.gradientEnd.value = defaults.gradientEnd;
          controls.gradientAngle.value = defaults.gradientAngle;
          controls.ratio.value = defaults.ratio;
          controls.size.value = defaults.size;
          controls.backgroundColor.value = defaults.backgroundColor;
          controls.backgroundAlpha.value = defaults.backgroundAlpha;
          controls.padding.value = defaults.padding;
          controls.preset.value = defaults.solidColor;
          render();
        });

        controls.download.addEventListener("click", downloadPng);
        controls.downloadSvg.addEventListener("click", downloadSvg);
        controls.iosSave.addEventListener("click", showIOSSaveImage);
        controls.iosSaveClose.addEventListener("click", closeIOSSaveModal);
        controls.iosSaveModal.addEventListener("click", (event) => {
          if (event.target === controls.iosSaveModal) closeIOSSaveModal();
        });
        window.addEventListener("keydown", (event) => {
          if (event.key === "Escape") closeIOSSaveModal();
        });
      }

      function getState() {
        return {
          mode: document.querySelector('input[name="colorMode"]:checked').value,
          solidColor: controls.solidColor.value,
          gradientStart: controls.gradientStart.value,
          gradientEnd: controls.gradientEnd.value,
          gradientAngle: Number(controls.gradientAngle.value),
          ratio: controls.ratio.value,
          size: controls.size.value,
          backgroundColor: controls.backgroundColor.value,
          backgroundAlpha: Number(controls.backgroundAlpha.value) / 100,
          padding: Number(controls.padding.value),
        };
      }

      function render() {
        if (!baseSvg) return;
        const state = getState();
        const [width, height] = sizeMap[state.size][state.ratio];
        const ratioParts = state.ratio.split(":").map(Number);

        controls.gradientControls.hidden = state.mode === "solid";
        controls.angleControl.hidden = state.mode !== "linear";
        controls.angleValue.textContent = `${state.gradientAngle}°`;
        controls.alphaValue.textContent = `${Math.round(state.backgroundAlpha * 100)}%`;
        controls.paddingValue.textContent = `${state.padding}%`;
        dimensions.textContent = `${width} x ${height}px`;

        frame.style.setProperty("--preview-ratio", `${ratioParts[0]} / ${ratioParts[1]}`);
        frame.style.setProperty("--preview-width", state.ratio === "9:16" ? "430px" : "560px");
        frame.style.background = previewBackground(state.backgroundColor, state.backgroundAlpha);
        preview.style.width = `${100 - state.padding * 2}%`;

        setPreviewSource(buildColoredSvg(state));
        status.textContent = "プレビュー更新済み";
        status.classList.remove("error");
      }

      function buildColoredSvg(state) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(baseSvg, "image/svg+xml");
        const svg = doc.documentElement;
        const parseError = doc.querySelector("parsererror");

        if (parseError || svg.nodeName.toLowerCase() !== "svg") {
          throw new Error("Invalid SVG");
        }

        svg.removeAttribute("width");
        svg.removeAttribute("height");
        svg.setAttribute("xmlns", "http://www.w3.org/2000/svg");

        const style = doc.createElementNS("http://www.w3.org/2000/svg", "style");
        style.textContent = "path,polygon,rect,circle,ellipse,line,polyline{fill:var(--emblem-fill);stroke:var(--emblem-stroke,none)}";
        svg.insertBefore(style, svg.firstChild);

        if (state.mode === "solid") {
          svg.style.setProperty("--emblem-fill", state.solidColor);
        } else {
          const defs = doc.createElementNS("http://www.w3.org/2000/svg", "defs");
          const gradient =
            state.mode === "linear"
              ? doc.createElementNS("http://www.w3.org/2000/svg", "linearGradient")
              : doc.createElementNS("http://www.w3.org/2000/svg", "radialGradient");

          gradient.setAttribute("id", "emblemGradient");
          if (state.mode === "linear") {
            const points = angleToPoints(state.gradientAngle);
            gradient.setAttribute("x1", points.x1);
            gradient.setAttribute("y1", points.y1);
            gradient.setAttribute("x2", points.x2);
            gradient.setAttribute("y2", points.y2);
          } else {
            gradient.setAttribute("cx", "50%");
            gradient.setAttribute("cy", "46%");
            gradient.setAttribute("r", "68%");
          }

          const start = doc.createElementNS("http://www.w3.org/2000/svg", "stop");
          start.setAttribute("offset", "0%");
          start.setAttribute("stop-color", state.gradientStart);

          const end = doc.createElementNS("http://www.w3.org/2000/svg", "stop");
          end.setAttribute("offset", "100%");
          end.setAttribute("stop-color", state.gradientEnd);

          gradient.append(start, end);
          defs.append(gradient);
          svg.insertBefore(defs, svg.firstChild);
          svg.style.setProperty("--emblem-fill", "url(#emblemGradient)");
        }

        return new XMLSerializer().serializeToString(svg);
      }

      function angleToPoints(angle) {
        const radians = ((angle - 90) * Math.PI) / 180;
        const x = Math.cos(radians);
        const y = Math.sin(radians);
        return {
          x1: `${50 - x * 50}%`,
          y1: `${50 - y * 50}%`,
          x2: `${50 + x * 50}%`,
          y2: `${50 + y * 50}%`,
        };
      }

      function setPreviewSource(svgText) {
        if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
        const blob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
        currentObjectUrl = URL.createObjectURL(blob);
        preview.src = currentObjectUrl;
      }

      async function downloadPng() {
        const state = getState();
        const canvas = await buildExportCanvas(state);

        const link = document.createElement("a");
        link.download = getFileName(state);
        link.href = canvas.toDataURL("image/png");
        link.click();
      }

      function downloadSvg() {
        const state = getState();
        const svgText = buildExportSvg(state);
        const blob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");

        link.download = getFileName(state, "svg");
        link.href = url;
        link.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      async function showIOSSaveImage() {
        try {
          const state = getState();
          const canvas = await buildExportCanvas(state);
          controls.iosSaveImage.src = canvas.toDataURL("image/png");
          controls.iosSaveModal.hidden = false;
          document.body.classList.add("modal-open");
        } catch (error) {
          console.error(error);
          alert("PNG化に失敗しました。");
        }
      }

      function closeIOSSaveModal() {
        controls.iosSaveModal.hidden = true;
        document.body.classList.remove("modal-open");
      }

      function buildExportSvg(state) {
        const [width, height] = sizeMap[state.size][state.ratio];
        const emblemText = buildColoredSvg(state);
        const parser = new DOMParser();
        const doc = parser.parseFromString(emblemText, "image/svg+xml");
        const sourceSvg = doc.documentElement;
        const [viewX, viewY, viewWidth, viewHeight] = sourceSvg
          .getAttribute("viewBox")
          .split(/\s+/)
          .map(Number);
        const paddingPixels = (Math.min(width, height) * state.padding) / 100;
        const drawAreaWidth = width - paddingPixels * 2;
        const drawAreaHeight = height - paddingPixels * 2;
        const scale = Math.min(drawAreaWidth / viewWidth, drawAreaHeight / viewHeight);
        const drawWidth = viewWidth * scale;
        const drawHeight = viewHeight * scale;
        const x = (width - drawWidth) / 2 - viewX * scale;
        const y = (height - drawHeight) / 2 - viewY * scale;
        const style = sourceSvg.getAttribute("style") || "";
        const content = Array.from(sourceSvg.childNodes)
          .map((node) => new XMLSerializer().serializeToString(node))
          .join("");
        const background =
          state.backgroundAlpha > 0
            ? `<rect width="100%" height="100%" fill="${state.backgroundColor}" fill-opacity="${state.backgroundAlpha}"/>`
            : "";

        return `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" style="${escapeAttribute(style)}">
  ${background}
  <g transform="translate(${round(x)} ${round(y)}) scale(${round(scale)})">
    ${content}
  </g>
</svg>`;
      }

      async function buildExportCanvas(state) {
        const [width, height] = sizeMap[state.size][state.ratio];
        const svgText = buildColoredSvg(state);
        const svgUrl = URL.createObjectURL(new Blob([svgText], { type: "image/svg+xml;charset=utf-8" }));

        try {
          const image = await loadImage(svgUrl);
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext("2d");

          if (state.backgroundAlpha > 0) {
            ctx.fillStyle = rgba(state.backgroundColor, state.backgroundAlpha);
            ctx.fillRect(0, 0, width, height);
          }

          const paddingPixels = (Math.min(width, height) * state.padding) / 100;
          const drawAreaWidth = width - paddingPixels * 2;
          const drawAreaHeight = height - paddingPixels * 2;
          const scale = Math.min(drawAreaWidth / image.naturalWidth, drawAreaHeight / image.naturalHeight);
          const drawWidth = image.naturalWidth * scale;
          const drawHeight = image.naturalHeight * scale;
          const x = (width - drawWidth) / 2;
          const y = (height - drawHeight) / 2;

          ctx.drawImage(image, x, y, drawWidth, drawHeight);
          return canvas;
        } finally {
          URL.revokeObjectURL(svgUrl);
        }
      }

      function getFileName(state, extension = "png") {
        return `aegis-arc-emblem-${state.ratio.replace(":", "x")}-${state.size}.${extension}`;
      }

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = reject;
          image.src = src;
        });
      }

      function rgba(hex, alpha) {
        const value = hex.replace("#", "");
        const r = parseInt(value.slice(0, 2), 16);
        const g = parseInt(value.slice(2, 4), 16);
        const b = parseInt(value.slice(4, 6), 16);
        return `rgb(${r} ${g} ${b} / ${alpha})`;
      }

      function previewBackground(hex, alpha) {
        const overlay = rgba(hex, alpha);
        return `
          linear-gradient(${overlay}, ${overlay}),
          linear-gradient(45deg, rgb(88 94 105 / 0.24) 25%, transparent 25%) 0 0 / 18px 18px,
          linear-gradient(-45deg, rgb(88 94 105 / 0.24) 25%, transparent 25%) 0 0 / 18px 18px,
          linear-gradient(45deg, transparent 75%, rgb(88 94 105 / 0.24) 75%) 0 0 / 18px 18px,
          linear-gradient(-45deg, transparent 75%, rgb(88 94 105 / 0.24) 75%) 0 0 / 18px 18px,
          #f7f8fa
        `;
      }

      function round(value) {
        return Number(value.toFixed(4));
      }

      function escapeAttribute(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll('"', "&quot;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }
    </script>
  </body>
</html>
